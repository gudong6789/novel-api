<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说自动阅读系统 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .dashboard {
            display: none;
        }
        
        .dashboard.active {
            display: block;
        }
        
        .login-form {
            display: block;
        }
        
        .login-form.hidden {
            display: none;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        
        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 12px;
        }
        
        .nav-tab {
            padding: 8px 16px;
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 14px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .nav-tab.active {
            background: #667eea;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        
        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        
        .data-table tr:hover {
            background: #f8f9fa;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-success {
            background: #d4edda;
            color: #155724;
        }
        
        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }
        
        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }
        
        .badge-info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 4px;
        }
        
        .btn-block {
            background: #dc3545;
            color: white;
        }
        
        .btn-unblock {
            background: #28a745;
            color: white;
        }
        
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            font-size: 20px;
            color: #333;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录表单 -->
        <div id="loginForm" class="login-form">
            <div class="logo">
                <h1>📚 管理后台</h1>
                <p>小说自动阅读系统</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="loginFormEl">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required placeholder="请输入密码">
                </div>
                
                <button type="submit" class="btn" id="loginBtn">登录</button>
            </form>
        </div>
        
        <!-- 管理后台主界面 -->
        <div id="dashboard" class="dashboard">
            <button class="logout-btn" onclick="logout()">退出登录</button>
            
            <div class="logo">
                <h1>📊 数据统计</h1>
                <p>小说自动阅读系统管理后台</p>
            </div>
            
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>授权码总数</h3>
                    <div class="value" id="totalCodes">-</div>
                </div>
                <div class="stat-card">
                    <h3>已激活</h3>
                    <div class="value" id="activeCodes">-</div>
                </div>
                <div class="stat-card">
                    <h3>设备总数</h3>
                    <div class="value" id="totalDevices">-</div>
                </div>
                <div class="stat-card">
                    <h3>在线设备</h3>
                    <div class="value" id="onlineDevices">-</div>
                </div>
            </div>
            
            <!-- 导航标签 -->
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchTab('authcodes')">授权码管理</button>
                <button class="nav-tab" onclick="switchTab('devices')">设备管理</button>
                <button class="nav-tab" onclick="switchTab('config')">全局配置</button>
            </div>
            
            <!-- 授权码管理 -->
            <div id="authcodesTab" class="tab-content active">
                <button class="btn-primary" onclick="showGenerateModal()">➕ 生成授权码</button>
                <button class="btn-primary" onclick="showBatchGenerateModal()">📦 批量生成</button>
                
                <div id="authcodesLoading" class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
                
                <table class="data-table" id="authcodesTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>授权码</th>
                            <th>有效期</th>
                            <th>状态</th>
                            <th>设备</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="authcodesBody"></tbody>
                </table>
            </div>
            
            <!-- 设备管理 -->
            <div id="devicesTab" class="tab-content">
                <div id="devicesLoading" class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
                
                <table class="data-table" id="devicesTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>设备名称</th>
                            <th>型号</th>
                            <th>状态</th>
                            <th>最后活跃</th>
                            <th>今日阅读</th>
                        </tr>
                    </thead>
                    <tbody id="devicesBody"></tbody>
                </table>
            </div>
            
            <!-- 全局配置 -->
            <div id="configTab" class="tab-content">
                <form id="configForm">
                    <div class="form-group">
                        <label>启动时间 - 开始 (小时)</label>
                        <input type="number" id="startHour" min="0" max="23" value="7">
                    </div>
                    <div class="form-group">
                        <label>启动时间 - 结束 (小时)</label>
                        <input type="number" id="endHour" min="0" max="23" value="9">
                    </div>
                    <div class="form-group">
                        <label>滑动间隔最小值 (毫秒)</label>
                        <input type="number" id="scrollIntervalMin" value="5000">
                    </div>
                    <div class="form-group">
                        <label>滑动间隔最大值 (毫秒)</label>
                        <input type="number" id="scrollIntervalMax" value="10000">
                    </div>
                    <div class="form-group">
                        <label>单次阅读最小时长 (毫秒)</label>
                        <input type="number" id="singleReadDurationMin" value="3600000">
                    </div>
                    <div class="form-group">
                        <label>单次阅读最大时长 (毫秒)</label>
                        <input type="number" id="singleReadDurationMax" value="7200000">
                    </div>
                    <div class="form-group">
                        <label>单 APP 单日最大时长 (毫秒)</label>
                        <input type="number" id="maxAppDailyTime" value="43200000">
                    </div>
                    <div class="form-group">
                        <label>单日总时长 (毫秒)</label>
                        <input type="number" id="totalDailyTime" value="86400000">
                    </div>
                    <button type="submit" class="btn">💾 保存配置</button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- 生成授权码模态框 -->
    <div id="generateModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>生成授权码</h2>
                <button class="close-btn" onclick="closeModal('generateModal')">&times;</button>
            </div>
            <form id="generateForm">
                <div class="form-group">
                    <label>有效期</label>
                    <select id="durationType" class="form-control" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px;">
                        <option value="1">1 天</option>
                        <option value="7">7 天</option>
                        <option value="30">30 天</option>
                        <option value="0">永久</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="generateNotes" placeholder="可选">
                </div>
                <button type="submit" class="btn">生成</button>
            </form>
        </div>
    </div>
    
    <!-- 批量生成模态框 -->
    <div id="batchModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>批量生成授权码</h2>
                <button class="close-btn" onclick="closeModal('batchModal')">&times;</button>
            </div>
            <form id="batchForm">
                <div class="form-group">
                    <label>生成数量</label>
                    <input type="number" id="batchCount" min="1" max="1000" value="10">
                </div>
                <div class="form-group">
                    <label>有效期</label>
                    <select id="batchDurationType" class="form-control" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px;">
                        <option value="1">1 天</option>
                        <option value="7">7 天</option>
                        <option value="30">30 天</option>
                        <option value="0">永久</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="batchNotes" placeholder="可选">
                </div>
                <button type="submit" class="btn">批量生成</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let authToken = localStorage.getItem('adminToken');
        
        // 初始化
        if (authToken) {
            showDashboard();
        }
        
        // 登录表单提交
        document.getElementById('loginFormEl').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            
            btn.disabled = true;
            btn.textContent = '登录中...';
            
            try {
                const response = await fetch(`${API_BASE}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    localStorage.setItem('adminToken', authToken);
                    showDashboard();
                } else {
                    showError(data.message);
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        });
        
        // 显示管理后台
        async function showDashboard() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('dashboard').classList.add('active');
            await loadStatistics();
            await loadAuthCodes();
            await loadDevices();
            await loadConfig();
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('adminToken');
            authToken = null;
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('dashboard').classList.remove('active');
        }
        
        // 加载统计数据
        async function loadStatistics() {
            try {
                const response = await fetch(`${API_BASE}/statistics`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalCodes').textContent = data.data.totalCodes;
                    document.getElementById('activeCodes').textContent = data.data.activeCodes;
                    document.getElementById('totalDevices').textContent = data.data.totalDevices;
                    document.getElementById('onlineDevices').textContent = data.data.onlineDevices;
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }
        
        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }
        
        // 加载授权码列表
        async function loadAuthCodes() {
            try {
                const response = await fetch(`${API_BASE}/auth/list?page=1&pageSize=100`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const tbody = document.getElementById('authcodesBody');
                    tbody.innerHTML = data.data.list.map(item => `
                        <tr>
                            <td style="font-family: monospace;">${item.code}</td>
                            <td>${item.expireTime ? formatExpireTime(item.expireTime) : '永久'}</td>
                            <td>${getStatusBadge(item)}</td>
                            <td>${item.deviceId || '-'}</td>
                            <td>
                                <button class="action-btn ${item.isBlocked ? 'btn-unblock' : 'btn-block'}" 
                                    onclick="toggleBlock('${item.code}', ${!item.isBlocked})">
                                    ${item.isBlocked ? '解封' : '封禁'}
                                </button>
                                <button class="action-btn btn-delete" onclick="deleteCode('${item.code}')">删除</button>
                            </td>
                        </tr>
                    `).join('');
                    
                    document.getElementById('authcodesLoading').style.display = 'none';
                    document.getElementById('authcodesTable').style.display = 'table';
                }
            } catch (error) {
                console.error('加载授权码失败:', error);
            }
        }
        
        // 加载设备列表
        async function loadDevices() {
            try {
                const response = await fetch(`${API_BASE}/device/list?page=1&pageSize=100`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const tbody = document.getElementById('devicesBody');
                    tbody.innerHTML = data.data.list.map(item => `
                        <tr>
                            <td>${item.deviceName || '未知设备'}</td>
                            <td>${item.deviceModel}</td>
                            <td><span class="badge ${item.isOnline ? 'badge-success' : 'badge-danger'}">${item.isOnline ? '🟢 在线' : '⚪ 离线'}</span></td>
                            <td>${formatTime(item.lastActiveTime)}</td>
                            <td>${(item.todayReadTime / 3600000).toFixed(1)} 小时</td>
                        </tr>
                    `).join('');
                    
                    document.getElementById('devicesLoading').style.display = 'none';
                    document.getElementById('devicesTable').style.display = 'table';
                }
            } catch (error) {
                console.error('加载设备失败:', error);
            }
        }
        
        // 加载配置
        async function loadConfig() {
            try {
                const response = await fetch(`${API_BASE}/config/global`);
                const data = await response.json();
                
                if (data.success && data.config) {
                    document.getElementById('startHour').value = data.config.startHour;
                    document.getElementById('endHour').value = data.config.endHour;
                    document.getElementById('scrollIntervalMin').value = data.config.scrollIntervalMin;
                    document.getElementById('scrollIntervalMax').value = data.config.scrollIntervalMax;
                    document.getElementById('singleReadDurationMin').value = data.config.singleReadDurationMin;
                    document.getElementById('singleReadDurationMax').value = data.config.singleReadDurationMax;
                    document.getElementById('maxAppDailyTime').value = data.config.maxAppDailyTime;
                    document.getElementById('totalDailyTime').value = data.config.totalDailyTime;
                }
            } catch (error) {
                console.error('加载配置失败:', error);
            }
        }
        
        // 保存配置
        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const config = {
                startHour: parseInt(document.getElementById('startHour').value),
                endHour: parseInt(document.getElementById('endHour').value),
                scrollIntervalMin: parseInt(document.getElementById('scrollIntervalMin').value),
                scrollIntervalMax: parseInt(document.getElementById('scrollIntervalMax').value),
                singleReadDurationMin: parseInt(document.getElementById('singleReadDurationMin').value),
                singleReadDurationMax: parseInt(document.getElementById('singleReadDurationMax').value),
                maxAppDailyTime: parseInt(document.getElementById('maxAppDailyTime').value),
                totalDailyTime: parseInt(document.getElementById('totalDailyTime').value)
            };
            
            try {
                const response = await fetch(`${API_BASE}/config/global`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(config)
                });
                
                const data = await response.json();
                if (data.success) {
                    showSuccess('配置已保存');
                } else {
                    showError(data.message);
                }
            } catch (error) {
                showError('保存失败');
            }
        });
        
        // 显示生成模态框
        function showGenerateModal() {
            document.getElementById('generateModal').classList.add('active');
        }
        
        // 显示批量生成模态框
        function showBatchGenerateModal() {
            document.getElementById('batchModal').classList.add('active');
        }
        
        // 关闭模态框
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        // 生成授权码
        document.getElementById('generateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            try {
                const response = await fetch(`${API_BASE}/auth/generate`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        durationType: parseInt(document.getElementById('durationType').value),
                        notes: document.getElementById('generateNotes').value
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    showSuccess(`授权码生成成功：${data.authCode}`);
                    closeModal('generateModal');
                    await loadAuthCodes();
                    await loadStatistics();
                } else {
                    showError(data.message);
                }
            } catch (error) {
                showError('生成失败');
            }
        });
        
        // 批量生成
        document.getElementById('batchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            try {
                const response = await fetch(`${API_BASE}/auth/generate-batch`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        count: parseInt(document.getElementById('batchCount').value),
                        durationType: parseInt(document.getElementById('batchDurationType').value),
                        notes: document.getElementById('batchNotes').value
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    showSuccess(`成功生成 ${data.codes.length} 个授权码`);
                    closeModal('batchModal');
                    await loadAuthCodes();
                    await loadStatistics();
                } else {
                    showError(data.message);
                }
            } catch (error) {
                showError('生成失败');
            }
        });
        
        // 封禁/解封
        async function toggleBlock(code, blocked) {
            try {
                const response = await fetch(`${API_BASE}/auth/block`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ code, blocked })
                });
                
                const data = await response.json();
                if (data.success) {
                    await loadAuthCodes();
                } else {
                    showError(data.message);
                }
            } catch (error) {
                showError('操作失败');
            }
        }
        
        // 删除授权码
        async function deleteCode(code) {
            if (!confirm(`确定要删除授权码 ${code} 吗？`)) return;
            
            try {
                const response = await fetch(`${API_BASE}/auth/delete/${code}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const data = await response.json();
                if (data.success) {
                    await loadAuthCodes();
                    await loadStatistics();
                } else {
                    showError(data.message);
                }
            } catch (error) {
                showError('删除失败');
            }
        }
        
        // 工具函数
        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('successMessage');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
        
        function getStatusBadge(item) {
            if (item.isBlocked) return '<span class="badge badge-danger">🚫 已封禁</span>';
            if (!item.isActive) return '<span class="badge badge-info">⭕ 未使用</span>';
            return '<span class="badge badge-success">✅ 已激活</span>';
        }
        
        function formatExpireTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('zh-CN');
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN');
        }
    </script>
</body>
</html>
